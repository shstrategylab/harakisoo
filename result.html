<script>
const TABS = [
  { id:'overview',   label:'개요' },
  { id:'seoncheon', label:'선천괘' },
  { id:'hucheon',   label:'후천괘' },
  { id:'yunnyeon',  label:'올해 운' },
  { id:'timeline',  label:'대운 흐름' },
  { id:'events',    label:'인생 사건' },
  { id:'suri',      label:'수리 계산' },
];

// 로딩 스텝 표시
const steps = ['천간수 변환','지지수 변환','선천괘 도출','원당효 계산','후천괘 도출'];
steps.forEach((s,i) => {
  const span = document.createElement('span');
  span.textContent = s;
  span.style.cssText = `font-size:.75rem;padding:4px 10px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--text-muted);animation:fadeIn .4s ease ${i*.2}s both;`;
  document.getElementById('loading-steps').appendChild(span);
});

// 탭 렌더
const tabBar = document.getElementById('tab-bar');
TABS.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (t.id === 'overview' ? ' active' : '');
  btn.textContent = t.label;
  btn.onclick = () => switchTab(t.id);
  tabBar.appendChild(btn);
});

function switchTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${id}`).style.display = 'block';
  document.querySelector(`button[onclick="switchTab('${id}')"]`)?.classList.add('active');
}

function goToOverviewPrompt() {
  switchTab('overview');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => {
    document.getElementById('prompt-question')?.focus();
  }, 300);
}

// tabBar 버튼에 onclick 연결
tabBar.querySelectorAll('.tab-btn').forEach((btn,i) => {
  btn.setAttribute('onclick', `switchTab('${TABS[i].id}')`);
});

function guaCard(gua, lines, highlightPos, badge, extra='') {
  return `
  <div class="card" style="flex:1;min-width:240px;">

      <span style="font-size:.75rem;color:var(--text-muted);">${gua._label||''}</span>
      ${badge ? `<span style="font-size:.7rem;background:rgba(124,58,237,.2);color:var(--accent-light);padding:2px 8px;border-radius:20px;">${badge}</span>` : ''}
    </div>
    <div style="display:flex;gap:18px;align-items:center;margin-bottom:14px;">
      ${Harakisu.renderYao(lines, highlightPos, 'sm')}
      <div>
        <div style="font-size:1.35rem;font-weight:800;">${gua.name||'—'}</div>
        <div style="font-size:.75rem;color:var(--text-muted);margin-top:2px;">${gua.guaNo}번괘</div>
      </div>
    </div>
    ${gua.dansa ? `<p style="font-size:.85rem;color:var(--text-muted);line-height:1.7;border-top:1px solid var(--border);padding-top:12px;">${gua.dansa}</p>` : ''}
    ${gua.one_line ? `<p style="font-size:.8rem;color:var(--gold);line-height:1.6;margin-top:8px;font-style:italic;">"${gua.one_line}"</p>` : ''}
    ${gua.keyword_tags?.length ? `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;">${gua.keyword_tags.map(t=>`<span style="font-size:.65rem;padding:1px 8px;border-radius:20px;background:rgba(124,58,237,.12);color:var(--accent-light);">${t}</span>`).join('')}</div>` : ''}
    ${extra}
  </div>`;
}

    <div style="background:rgba(212,168,67,.08);border-left:3px solid var(--gold);padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:14px;">

      <p style="font-size:.9rem;font-style:italic;line-height:1.6;">"${gua.one_line}"</p>
    </div>` : '';

  // 키워드 태그

function timelineHtml(tl, birthYear) {
  const curYear = new Date().getFullYear();
  const korAge  = curYear - birthYear + 1;
  const cells   = tl.map(t => {
    const isCur = korAge >= t.startAge && korAge <= t.endAge;
    const bg    = isCur ? 'rgba(124,58,237,.12)' : t.isHc ? 'rgba(212,168,67,.05)' : 'transparent';
    const topBar= isCur ? '<div style="position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);"></div>' : '';
    return `
    <div style="position:relative;min-width:${t.years*14}px;padding:10px 8px;border-left:1px solid var(--border);background:${bg};">
      ${topBar}
      <div style="font-size:.6rem;color:var(--text-muted);margin-bottom:5px;">${t.startAge}~${t.endAge}세</div>
      ${Harakisu.renderYao([t.yang?1:0], null, 'sm')}
      <div style="font-size:.68rem;margin-top:5px;font-weight:${isCur?700:400};color:${isCur?'var(--accent-light)':'var(--text-muted)'};">
        ${t.gua}괘 ${t.yaoPos}효
      </div>
      <div style="font-size:.58rem;color:${t.yang?'#818cf8':'#f472b6'};margin-top:2px;">${t.yang?'양 9년':'음 6년'}</div>
      ${t.isHc ? '<div style="font-size:.55rem;color:var(--gold);">후천</div>' : ''}

}

function timelineListHtml(tl, birthYear) {
  const curYear = new Date().getFullYear();
  const korAge  = curYear - birthYear + 1;

  // 대운 시기별 인생 단계 레이블
  function lifeStage(startAge) {
    if (startAge <= 10)  return '유년기 · 기질 형성';
    if (startAge <= 20)  return '청소년기 · 가능성 탐색';
    if (startAge <= 30)  return '청년기 · 도전과 시작';
    if (startAge <= 40)  return '장년 초반 · 성취와 확장';
    if (startAge <= 50)  return '장년 중반 · 전환과 깊이';
    if (startAge <= 60)  return '중년기 · 결실과 성숙';
    if (startAge <= 70)  return '초로기 · 지혜와 정리';
    return '노년기 · 완성과 회귀';
  }

  // 양효/음효 기운 설명
  function yaoEnergy(yang) {
    return yang
      ? '양효(━) 구간 — 적극적·외향적 에너지가 강합니다. 도전·확장·표출의 시기입니다.'
      : '음효(- -) 구간 — 수용적·내향적 에너지가 강합니다. 수렴·준비·내실의 시기입니다.';
  }

  return tl.map(t => {
    const isCur  = korAge >= t.startAge && korAge <= t.endAge;
    const guaInfo = Harakisu.DB.dansa?.[t.gua] || Harakisu.DB.dansa?.[String(t.gua)] || {};
    const yaoInfo = Harakisu.DB.yao?.[t.gua]?.lines?.[t.yaoPos]
                 || Harakisu.DB.yao?.[String(t.gua)]?.lines?.[t.yaoPos] || {};
    const guaLines = Harakisu.GUA_LINES[t.gua] || [];

    return `
    <div class="card" style="border-color:${isCur?'var(--accent)':'var(--border)'};background:${isCur?'rgba(124,58,237,.08)':'var(--surface)'};">

      <!-- 헤더 -->
      <div style="display:flex;gap:14px;align-items:center;margin-bottom:14px;">
        ${Harakisu.renderYao(guaLines, t.yaoPos, 'sm')}
        <div style="flex:1;">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px;">
            <span style="font-weight:800;font-size:1rem;">${t.startAge}~${t.endAge}세</span>
            <span style="font-size:.72rem;color:var(--text-muted);">(${t.startYear}~${t.endYear}년)</span>
            ${isCur ? '<span style="font-size:.7rem;background:var(--accent);color:#fff;padding:1px 8px;border-radius:20px;">▶ 현재</span>' : ''}
            ${t.isHc ? '<span style="font-size:.7rem;color:var(--gold);border:1px solid var(--gold);padding:1px 7px;border-radius:20px;">후천</span>' : ''}
          </div>
          <div style="font-size:.78rem;color:var(--text-muted);">${lifeStage(t.startAge)} · ${t.yang?'양효 9년':'음효 6년'}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:1rem;font-weight:800;color:${isCur?'var(--accent-light)':'var(--text)'};">${guaInfo.name||t.gua+'번괘'}</div>
          <div style="font-size:.7rem;color:var(--text-muted);">${t.gua}번괘 ${t.yaoPos}효</div>
          ${GUA_MODERN[t.gua] ? `<div style="font-size:.68rem;margin-top:3px;padding:2px 7px;border-radius:12px;background:rgba(124,58,237,.1);color:var(--accent-light);display:inline-block;">${GUA_MODERN[t.gua].k}</div>` : ''}
        </div>
      </div>

      <!-- 이 시기의 에너지 -->
      <div style="font-size:.8rem;color:${t.yang?'#818cf8':'#f472b6'};margin-bottom:10px;padding:6px 10px;background:${t.yang?'rgba(129,140,248,.08)':'rgba(244,114,182,.08)'};border-radius:6px;">
        ${yaoEnergy(t.yang)}
      </div>

      <!-- 괘 해석 -->
      ${guaInfo.practical ? `
      <div style="border-top:1px solid var(--border);padding-top:10px;margin-top:2px;">
        <p style="font-size:.68rem;color:var(--text-muted);margin-bottom:4px;">이 시기의 핵심 기운 (${guaInfo.name})</p>
        <p style="font-size:.85rem;line-height:1.75;">${guaInfo.practical}</p>
      </div>` : ''}

      <!-- 효사 -->
      ${yaoInfo.text_ko ? `
      <div style="border-top:1px solid var(--border);padding-top:10px;margin-top:10px;">
        <p style="font-size:.68rem;color:var(--gold);margin-bottom:4px;">${t.yaoPos}효 메시지</p>
        <p style="font-size:.85rem;font-weight:600;margin-bottom:4px;">${yaoInfo.text_ko}</p>
        ${yaoInfo.comment_ko ? `<p style="font-size:.82rem;color:var(--text-muted);line-height:1.7;">${yaoInfo.comment_ko}</p>` : ''}
      </div>` : ''}

      <!-- 주의사항 -->
      ${guaInfo.caution ? `
      <div style="border-top:1px solid var(--border);padding-top:10px;margin-top:10px;">
        <p style="font-size:.68rem;color:#f87171;margin-bottom:4px;">⚠ 이 시기 주의사항</p>
        <p style="font-size:.82rem;color:var(--text-muted);line-height:1.7;">${guaInfo.caution}</p>
      </div>` : ''}

    </div>`;
  }).join('');
}

          酉:{keyword:'완성도·정제된 미', desc:'마무리를 잘하는 섬세한 힘'},
          戌:{keyword:'전환 수용·재정비', desc:'삶의 고비마다 새롭게 정비'},
          亥:{keyword:'내면의 힘·준비', desc:'조용히 에너지를 모으는 기질'},
        };
        // 8개 소성괘 이름
        const PALGU = ['건(乾)','태(兌)','이(離)','진(震)','손(巽)','감(坎)','간(艮)','곤(坤)'];
        const csF = suri.csF, jsF = suri.jsF;
        const sangGua = PALGU[(csF % 8 || 8) - 1];
        const haGua   = PALGU[(jsF % 8 || 8) - 1];

        const allChars = [
          ...suri.chunganList.map((s,i)=>({char:s.char, su:s.su, label:`${['연','월','일','시'][i]}간`, isGan:true})),
          ...suri.jijiList.map((s,i)=>({char:s.char, su:s.su, label:`${['연','월','일','시'][i]}지`, isGan:false})),
        ];

        return allChars.map(c=>{
          const m = CHAR_MEANING[c.char] || {keyword:'—', desc:'—'};
          const isOdd = c.su % 2 !== 0;
          const suType = isOdd ? '홀수→천수' : '짝수→지수';
          const suColor = isOdd ? 'var(--accent-light)' : '#f472b6';

          // 이 글자가 상괘/하괘 중 어디에 기여했는지
          let roleText = '';
          if (isOdd) {
            // 천수에 포함
            const role = gender==='male' ? `상괘 ${sangGua} 형성에 기여` : `하괘 ${haGua} 형성에 기여`;
            roleText = role;
          } else {
            const role = gender==='male' ? `하괘 ${haGua} 형성에 기여` : `상괘 ${sangGua} 형성에 기여`;
            roleText = role;
          }

          return `
          <div style="padding:14px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
              <span style="font-size:1.3rem;font-weight:800;color:${c.isGan?'var(--accent-light)':'#f472b6'};">${c.char}</span>
              <div>
                <span style="font-size:.72rem;color:var(--text-muted);">${c.label}</span>
                <span style="font-size:.72rem;margin-left:8px;padding:1px 7px;border-radius:20px;background:rgba(124,58,237,.12);color:${suColor};">${suType} · ${c.su}</span>
              </div>
            </div>
            <div style="display:flex;gap:6px;align-items:center;font-size:.82rem;flex-wrap:wrap;">
              <span style="color:var(--text);">${m.keyword}</span>
              <span style="color:var(--text-muted);">→</span>
              <span style="color:var(--text-muted);">${m.desc}</span>
              <span style="color:var(--border);">|</span>
              <span style="color:var(--gold);font-size:.78rem;">⟹ ${roleText}</span>
            </div>
          </div>`;
        }).join('');
      })()}
    </div>

    <div class="card" style="margin-top:16px;">
      <h3 style="font-weight:700;margin-bottom:14px;">천수 · 지수 총평</h3>
      ${(()=>{
        const cs = suri.cheonsu, js = suri.jisu, total = cs + js;
        const csComment = cs <= 15
          ? '천수가 낮은 편입니다. 강하게 밀어붙이기보다 내실을 다지고 협력하는 방식이 잘 맞습니다.'
          : cs <= 25
          ? '천수가 중간 범위입니다. 추진력과 신중함이 균형을 이루며, 상황에 따라 유연하게 대응합니다.'
          : '천수가 높은 편입니다. 강한 추진력과 독립적인 기질을 가지며, 주도적으로 일을 이끌어가는 힘이 있습니다.';
        const jsComment = js <= 15
          ? '지수가 낮은 편입니다. 현실적 안정보다 변화와 이상을 추구하는 경향이 있습니다.'
          : js <= 25
          ? '지수가 중간 범위입니다. 현실 감각과 이상 사이에서 균형을 잡아가는 기질입니다.'
          : '지수가 높은 편입니다. 현실적이고 안정 지향적이며, 꾸준히 기반을 쌓아가는 능력이 뛰어납니다.';
        const totalComment = total <= 30
          ? '전체 에너지 총량이 낮습니다. 소수에 집중하고 에너지를 아끼며 깊이 있게 파고드는 삶이 유리합니다.'
          : total <= 50
          ? '균형 잡힌 에너지 총량입니다. 다양한 분야에서 고루 능력을 발휘할 수 있는 구조입니다.'
          : '에너지 총량이 높습니다. 활동 범위가 넓고 여러 방면으로 에너지를 쏟는 삶을 살게 됩니다.';
        return `
          <div style="padding:12px 14px;background:var(--surface2);border-radius:8px;margin-bottom:8px;">
            <p style="font-size:.72rem;color:var(--accent-light);margin-bottom:4px;">천수 ${cs} — 하늘의 기운 (추진·의지·표현)</p>
            <p style="font-size:.85rem;line-height:1.7;">${csComment}</p>
          </div>
          <div style="padding:12px 14px;background:var(--surface2);border-radius:8px;margin-bottom:8px;">
            <p style="font-size:.72rem;color:#f472b6;margin-bottom:4px;">지수 ${js} — 땅의 기운 (현실·안정·수용)</p>
            <p style="font-size:.85rem;line-height:1.7;">${jsComment}</p>
          </div>
          <div style="padding:12px 14px;background:var(--surface2);border-radius:8px;">
            <p style="font-size:.72rem;color:var(--gold);margin-bottom:4px;">합계 ${total} — 전체 에너지 총량</p>
            <p style="font-size:.85rem;line-height:1.7;">${totalComment}</p>
          </div>`;
      })()}
    </div>`;

  // 로딩 숨기기
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('result-wrap').style.display    = 'block';

  // 프롬프트 이벤트 연결
  connectPromptBoxes();
}

function connectPromptBoxes() {
  document.querySelectorAll('#prompt-question').forEach(ta => {
    ta.addEventListener('input', updatePreviews);
  });
  updatePreviews();
}

function updatePreviews() {
  if (!RESULT) return;
  const q = document.getElementById('prompt-question')?.value || '';
  const text = buildPrompt(RESULT, q);
  document.querySelectorAll('#prompt-preview').forEach(el => el.textContent = text);
}

function copyPrompt() {
  if (!RESULT) return;
  const q = document.getElementById('prompt-question')?.value || '';
  navigator.clipboard.writeText(buildPrompt(RESULT, q)).then(() => {
    const btn = document.getElementById('copy-btn');
    const orig = btn.textContent;
    btn.textContent = '✓ 복사됨!';
    btn.style.background = '#16a34a';
    setTimeout(() => { btn.textContent = orig; btn.style.background = 'var(--accent)'; }, 2500);
  });
}

main();
</script>
</body>
</html>
